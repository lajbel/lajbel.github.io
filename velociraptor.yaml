scripts:
  build:
    cmd: deno run -A https://deno.land/x/lume@v1.3.0/ci.ts
    desc: 🏗️ Build src/ folder to .html static
  format:
    cmd: deno fmt --config deno.json .
    desc: ✨ Format all files with dprint
  serve:
    cmd: deno run -A https://deno.land/x/lume@v1.3.0/ci.ts --serve --src src/
    desc: 🔥 Serve lume site