name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Prettier
        uses: creyD/prettier_action@v4.1.1
        with:
          commit_message: Prettiered!
          prettier_options: --write **/*.html
